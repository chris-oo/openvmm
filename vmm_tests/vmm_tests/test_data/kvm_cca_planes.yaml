#
# This overlay is consumed by Arm software emulator FVP when running native
# OpenVMM KVM CCA tests. Unlike cca_planes.yaml, this targets the v14 KVM CCA
# userspace ABI, which requires TF-RMM RMM v2.0-bet1 support.
%YAML 1.2
---
description: >-
  Overlay to build TF-RMM with RMM v2.0-bet1 support for native OpenVMM KVM
  CCA testing.

buildex:
  btvars:
    # Determines the RMM Log level.
    RMM_LOG_LEVEL:
      type: string
      value: '10'

    # Determines the RMM Configuration (a.k.a. platform) to build.
    RMM_CONFIG:
      type: string
      value: 'fvp_defcfg'

    # Determines the branch or SHA to pull for TF-A which is suitable for the
    # current RMM.
    TFA_REVISION:
      type: string
      value: master

build:
  rmm:
    params:
      -DLOG_LEVEL: ${btvar:RMM_LOG_LEVEL}
      -DRMM_CONFIG: ${btvar:RMM_CONFIG}
      -DPLAT_CMN_CTX_MAX_XLAT_TABLES: 13
    repo:
      remote: https://git.trustedfirmware.org/TF-RMM/tf-rmm.git
      # RMM v2.0-bet1 commit tested by the v14 KVM CCA series.
      revision: 3340667a291acd5722cb45d05135d7aa15174b25
  tfa:
    params:
      GIC_ENABLE_V4_EXTN: 1
      RMM_V1_COMPAT: 0
    repo:
      revision: ${btvar:TFA_REVISION}
  linux:
    repo:
      remote: https://gitlab.arm.com/linux-arm/linux-cca.git
      # cca-host/v14, tested with this local KVM CCA stack.
      revision: f4e94cc01f1bc874ab35a47d308530cb58231d74
    artifacts:
      LINUX_SOURCE: ${param:sourcedir}
    prebuild:
      # Use source dir modification time as timestamp (for locally reproducible build).
      - export KBUILD_BUILD_TIMESTAMP="@$$(stat -c '%Y' ${param:sourcedir})"
      - ./scripts/config --file ${param:builddir}/.config --enable CONFIG_VIRT_DRIVERS
      # Reduce the number of timer exits from the guest.
      - ./scripts/config --file ${param:builddir}/.config --disable CONFIG_HZ_250 --enable CONFIG_HZ_100
      - ./scripts/config --file ${param:builddir}/.config --disable CONFIG_RANDOMIZE_BASE
  kvmtool:
    repo:
      kvmtool:
        remote: https://gitlab.arm.com/linux-arm/kvmtool-cca.git
        # cca/v12 from the KVM CCA v14 cover letter.
        revision: cb8a0f831ef0e7eec17893ee767b8db7c4234d63
    prebuild:
      - make -C kvmtool clean
      - find kvmtool -name '.*.d' -delete
      - (cd kvmtool && ./util/update_headers.sh ${artifact:LINUX_SOURCE})
  kvm-unit-tests:
    repo:
      remote: https://gitlab.arm.com/linux-arm/kvm-unit-tests-cca.git
      # cca/v4 from the KVM CCA v14 cover letter.
      revision: 6810c578fff399b33528335c7eae3c90e33847ff

run:
  params:
     # Enable Permission Indirection.
    -C cluster0.has_permission_indirection_s1: 2
    -C cluster1.has_permission_indirection_s1: 2
    -C cluster0.has_permission_indirection_s2: 2
    -C cluster1.has_permission_indirection_s2: 2

    # Enable Permission Overlay.
    -C cluster0.has_permission_overlay_s1: 2
    -C cluster1.has_permission_overlay_s1: 2
    -C cluster0.has_permission_overlay_s2: 2
    -C cluster1.has_permission_overlay_s2: 2
